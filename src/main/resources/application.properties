# Railway dynamically sets the PORT
server.port=${PORT:8081}

# Database credentials injected by Railway
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Automatically create/update database tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# (Optional but Recommended) Use env vars for your email credentials instead of hardcoding them
spring.mail.host=smtp.gmail.com
spring.mail.port=587
